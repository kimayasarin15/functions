<!DOCTYPE html>
<html>
    <head>
        <title>Functions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link href="reset.css" rel="stylesheet">
        <link href="style.css" rel="stylesheet">
        <script defer src="script.js"></script>
    </head>
    <body>
        <header>
            <h1>Mockup Generator</h1>
            <h2>See your work in the world</h2>
        </header>
        <main class="grid">
        <section id="main-form">
        <form>
            <section>
                <label for="text">Add your primary text:</label>
                <!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Attributes/maxlength added maxlength to my inputs -->
                <input id="primary-text" name="text" placeholder="Type here" required type="text" maxlength="12">
            </section>
                <section>
                <label for="text">Add your secondary text:</label>
                <input id="secondary-text" name="text" placeholder="Type here" required type="text" maxlength="15">
            </section>
            <section>
                <!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/input/color looked up how to add a color input-->
                <label for="color">Choose your primary text color</label>
                <input type="color" id="primary-color" name="color" value="#000000"/>
            </section>
             <section>
                <label for="color">Choose your secondary text color</label>
                <input type="color" id="secondary-color" name="color" value="#000000"/>
            </section>
            <!-- <section>
                come back to this
				<label for="styles">Choose your style:</label>
				<select id="styles" name="styles">
						<option>Style 1</option>
						<option>Style 2</option>
						<option>Style 3</option>
                </select>        
            </section> -->
        </form>
        <section>
            <label>Choose your style:</label>
            <button id="style-1">Style 1</button>
            <button id="style-2">Style 2</button>
            <button id="style-3">Style 3</button>
        </section>
        <section>
            <label>Choose your mockup:</label>
            <button id="image-1">Subway</button>
            <button id="image-2">Billboard</button>
        </section>
        <section>
            <input type="file" id="imageInput">
        </section>
        <section>
            <button type="reset" id="reset">Reset</button>
        </section>
        </section>
                <!-- I left the canvas in for now to come back to it -->
                <!-- <canvas id="canvas" width="900" height="600"></canvas> -->
        <section>
            <div id="posterbox">
                <img id="image" src="subway1.png"/>
                <img id="preview3"/>
                <h2 id="maintext">primary text</h2>
                <p id="secondtext">secondary text</p>
            </div>
        </section>
        </main>
        <footer>
            <p>Made by <a href="https://www.kimayasarin.com/">Kimaya Sarin</a></p>
        </footer>
    </body>
</html>
