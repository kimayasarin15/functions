<!DOCTYPE html>
<html>
    <head>
        <title>Functions</title>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link href="reset.css" rel="stylesheet">
        <link href="style.css" rel="stylesheet">
        <script defer src="script.js"></script>
    </head>
    <body>
        <header>
            <h1>Mockup Generator</h1>
            <h2>See your work in the world</h2>
        </header>
        <main class="grid">
        <section class="dials">
            <ul>
                <li>
                    <p>Text</p>
                    <!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/input/text
                     I used MDN to check how to add a textbox -->
                    <input type="text">
                </li>
                <li>
                    <p>Color</p>
                    <!-- https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/input/color -->
                    <input type="color">
                </li>
                <li>
                    <p>Style</p>
                    <ul class="buttons">
                        <li>
                            <p>S1</p>
                        </li>
                         <li>
                            <p>S2</p>
                        </li>
                         <li>
                            <p>S3</p>
                        </li>
                         <li>
                            <p>S4</p>
                        </li>
                         <li>
                            <p>S5</p>
                        </li>
                    </ul>
                </li>
                 <li>
                    <p>Position</p>
                    <ul class="buttons">
                        <li>
                            <p>P1</p>
                        </li>
                         <li>
                            <p>P2</p>
                        </li>
                         <li>
                            <p>P3</p>
                        </li>
                    </ul>
                </li>
            </ul>
        </section>
        <section class="canvas">
            <img src="Background 2.png">
        </section>
        </main>
        <footer>
            <p>Made by <a href="https://www.kimayasarin.com/">Kimaya Sarin</a></p>
        </footer>
    </body>
</html>
